<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сигналы рынка и демо-счёт</title>
  <style>
    :root {
      color-scheme: dark;
      --bg:#07111f;
      --card:#0f172a;
      --line:#1e293b;
      --text:#e2e8f0;
      --muted:#94a3b8;
      --green:#22c55e;
      --yellow:#f59e0b;
      --red:#ef4444;
      --blue:#38bdf8;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#020617,#07111f 40%,#0b1220);color:var(--text)}
    .wrap{max-width:1280px;margin:0 auto;padding:24px}
    .top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:20px}
    h1,h2,h3{margin:0 0 10px}
    p{margin:0;color:var(--muted);line-height:1.45}
    .grid{display:grid;gap:16px}
    .grid-4{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
    .grid-3{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
    .card{background:rgba(15,23,42,.92);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 18px 40px rgba(0,0,0,.28)}
    .hero{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(320px,.75fr);gap:16px}
    @media (max-width: 900px){.hero{grid-template-columns:1fr}}
    .big{font-size:32px;font-weight:800;letter-spacing:-0.02em}
    .label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
    .muted{color:var(--muted)}
    .status{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700}
    .status.buy{background:rgba(34,197,94,.15);color:#86efac}
    .status.wait{background:rgba(245,158,11,.15);color:#fcd34d}
    .status.exit{background:rgba(239,68,68,.15);color:#fca5a5}
    .status.live{background:rgba(56,189,248,.14);color:#7dd3fc}
    .status.off{background:rgba(239,68,68,.15);color:#fca5a5}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:14px}
    .stat{padding:14px;border:1px solid var(--line);border-radius:16px;background:rgba(2,6,23,.32)}
    .plan{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:16px}
    .pill{display:inline-flex;padding:5px 10px;border-radius:999px;background:#162236;color:#cbd5e1;font-size:12px;font-weight:700;margin-right:8px}
    .list{display:flex;flex-direction:column;gap:12px;margin-top:14px}
    .item{padding:14px;border:1px solid var(--line);border-radius:18px;background:rgba(2,6,23,.28)}
    .row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}
    th{color:#cbd5e1}
    .empty{padding:18px;border:1px dashed var(--line);border-radius:16px;color:var(--muted)}
    .hint{margin-top:12px;padding:14px;border-radius:16px;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.18)}
    .good{color:#86efac;font-weight:700}
    .bad{color:#fca5a5;font-weight:700}
    .btn{border:0;border-radius:12px;padding:11px 15px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer}
    .btn.secondary{background:#334155}
    .small{font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Сканер рынка + демо-счёт</h1>
        <p>Приложение само анализирует рынок, ищет сигналы, открывает виртуальные сделки на демо-счёте и считает статистику без реальных денег.</p>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn secondary" id="exportFull">Выгрузить полную статистику</button>
        <button class="btn secondary" id="resetPaper">Сбросить демо-счёт</button>
        <button class="btn" id="reloadBtn">Обновить сейчас</button>
      </div>
    </div>

    <section class="hero">
      <div class="card" id="bestIdeaCard"></div>
      <div class="card" id="engineCard"></div>
    </section>

    <section class="grid grid-4" style="margin-top:16px" id="summaryGrid"></section>

    <section class="grid grid-3" style="margin-top:16px">
      <div class="card" id="buyNowCard"></div>
      <div class="card" id="waitCard"></div>
      <div class="card" id="paperCard"></div>
    </section>

    <section class="grid grid-3" style="margin-top:16px">
      <div class="card" id="openPositionsCard"></div>
      <div class="card" id="closedTradesCard" style="grid-column:span 2"></div>
    </section>

    <section class="card" style="margin-top:16px" id="latestSignalsCard"></section>
  </div>
<script>
const fmt2 = new Intl.NumberFormat('ru-RU',{maximumFractionDigits:2});
const fmt4 = new Intl.NumberFormat('ru-RU',{maximumFractionDigits:4});
const money = (v)=>'$'+fmt2.format(Number(v||0));
const num = (v)=>fmt2.format(Number(v||0));
const price = (v)=> Number(v||0) >= 1000 ? fmt2.format(Number(v||0)) : fmt4.format(Number(v||0));
const pct = (v)=> `${fmt2.format(Number(v||0)*100)}%`;
const dt = (v)=> v ? new Date(v).toLocaleString('ru-RU') : '—';
const recText = { BUY_NOW:'Покупать сейчас', WAIT:'Ждать', EXIT:'Не покупать / выходить' };
const recClass = { BUY_NOW:'buy', WAIT:'wait', EXIT:'exit' };
const tf = (v)=> { const n=Number(v); if(!Number.isNaN(n)){ if(n<60) return n+' мин'; if(n%60===0) return (n/60)+' ч'; } return v; };

async function j(url, opts){ const r = await fetch(url, opts); if(!r.ok) throw new Error('Ошибка запроса '+r.status); return r.json(); }

function planHtml(s){
  if(!s.tradePlan) return '<div class="empty">Точный план ещё не сформирован.</div>';
  return `<div class="plan">
    <div class="stat"><span class="label">Вход</span><strong>${price(s.tradePlan.entryMin)} – ${price(s.tradePlan.entryMax)}</strong></div>
    <div class="stat"><span class="label">Стоп</span><strong>${price(s.tradePlan.stopLoss)}</strong></div>
    <div class="stat"><span class="label">Продажа 1</span><strong>${price(s.tradePlan.takeProfit1)}</strong></div>
    <div class="stat"><span class="label">Продажа 2</span><strong>${price(s.tradePlan.takeProfit2)}</strong></div>
  </div><div class="hint small">${s.tradePlan.entryComment}<br><span class="muted">Когда выходить: ${s.tradePlan.exitComment}</span></div>`;
}

function signalShort(s){
  return `<div class="item">
    <div class="row"><div><strong>${s.symbol}</strong> <span class="pill">${tf(s.timeframe)}</span></div><span class="status ${recClass[s.recommendation]}">${recText[s.recommendation]}</span></div>
    <p style="margin-top:8px">${s.headline}</p>
    ${s.tradePlan ? `<p class="small" style="margin-top:8px">Вход ${price(s.tradePlan.entryMin)} – ${price(s.tradePlan.entryMax)} · Стоп ${price(s.tradePlan.stopLoss)} · TP1 ${price(s.tradePlan.takeProfit1)}</p>` : ''}
  </div>`;
}

async function load(){
  const [health, opportunities, paper, latest] = await Promise.all([
    j('/api/health'),
    j('/api/opportunities'),
    j('/api/paper'),
    j('/api/signals/latest')
  ]);

  const best = opportunities.bestIdea;
  document.getElementById('bestIdeaCard').innerHTML = best ? `
    <span class="label">Главный сигнал сейчас</span>
    <div class="row">
      <div>
        <div class="big">${best.symbol}</div>
        <div style="margin-top:6px"><span class="pill">${tf(best.timeframe)}</span><span class="pill">цена ${price(best.price)}</span></div>
      </div>
      <span class="status ${recClass[best.recommendation]}">${recText[best.recommendation]}</span>
    </div>
    <p style="margin-top:14px">${best.shortText}</p>
    ${planHtml(best)}
  ` : `
    <span class="label">Главный сигнал сейчас</span>
    <div class="empty">Пока нет готовой идеи. Приложение ждёт следующий цикл сканирования рынка.</div>
  `;

  document.getElementById('engineCard').innerHTML = `
    <span class="label">Что делает приложение</span>
    <div class="row"><span class="status ${health.analyzer.isRunning ? 'live' : 'off'}">${health.analyzer.isRunning ? 'Сейчас анализирует рынок' : 'Ждёт следующего цикла'}</span><span class="small muted">Последний цикл: ${dt(health.analyzer.lastRunAt)}</span></div>
    <div class="stats">
      <div class="stat"><span class="label">Монет в сканере</span><strong>${health.universe.analyzedSymbols}</strong></div>
      <div class="stat"><span class="label">Циклов выполнено</span><strong>${health.analyzer.runCount}</strong></div>
      <div class="stat"><span class="label">Демо счёт</span><strong>${money(paper.summary.balanceUsd)}</strong></div>
      <div class="stat"><span class="label">Открыто позиций</span><strong>${paper.summary.openPositions}</strong></div>
    </div>
    <div class="hint small">Приложение автоматически открывает виртуальные сделки по сигналам <strong>«Покупать сейчас»</strong>, без реальных денег, и считает результат. ${health.analyzer.lastError ? '<br><span class="bad">Последняя ошибка: '+health.analyzer.lastError+'</span>' : ''}</div>
  `;

  document.getElementById('summaryGrid').innerHTML = `
    <div class="card"><span class="label">Покупать сейчас</span><div class="big">${opportunities.buyNow.length}</div></div>
    <div class="card"><span class="label">Ждать</span><div class="big">${opportunities.wait.length}</div></div>
    <div class="card"><span class="label">Закрытых демо-сделок</span><div class="big">${paper.summary.closedTrades}</div></div>
    <div class="card"><span class="label">Результат демо-счёта</span><div class="big ${Number(paper.summary.totalPnlUsd)>=0?'good':'bad'}">${money(paper.summary.totalPnlUsd)}</div></div>
  `;

  document.getElementById('buyNowCard').innerHTML = `<h2>Сигналы: покупать сейчас</h2>${opportunities.buyNow.length ? '<div class="list">'+opportunities.buyNow.slice(0,6).map(signalShort).join('')+'</div>' : '<div class="empty">Пока нет сильных сигналов на вход.</div>'}`;
  document.getElementById('waitCard').innerHTML = `<h2>Сигналы: ждать</h2>${opportunities.wait.length ? '<div class="list">'+opportunities.wait.slice(0,6).map(signalShort).join('')+'</div>' : '<div class="empty">Сейчас всё либо уже отработало, либо рынок слабый.</div>'}`;
  document.getElementById('paperCard').innerHTML = `
    <h2>Демо-счёт</h2>
    <table>
      <tr><th>Стартовый баланс</th><td>${money(paper.summary.startingBalanceUsd)}</td></tr>
      <tr><th>Текущий баланс</th><td>${money(paper.summary.balanceUsd)}</td></tr>
      <tr><th>Итог PnL</th><td class="${Number(paper.summary.totalPnlUsd)>=0?'good':'bad'}">${money(paper.summary.totalPnlUsd)}</td></tr>
      <tr><th>Win rate</th><td>${pct(paper.summary.winRate || 0)}</td></tr>
      <tr><th>Комиссии</th><td>${money(paper.summary.totalFeesUsd)}</td></tr>
      <tr><th>Последнее событие</th><td>${dt(paper.summary.lastEventAt)}</td></tr>
    </table>
  `;

  document.getElementById('openPositionsCard').innerHTML = `<h2>Открытые виртуальные сделки</h2>${paper.openPositions.length ? '<table><thead><tr><th>Монета</th><th>Вход</th><th>Стоп</th><th>TP1</th><th>TP2</th></tr></thead><tbody>'+paper.openPositions.slice(0,10).map(p=>`<tr><td>${p.symbol}<div class="small muted">${tf(p.timeframe)}</div></td><td>${price(p.entryPrice)}</td><td>${price(p.stopLoss)}</td><td>${price(p.takeProfit1)}</td><td>${price(p.takeProfit2)}</td></tr>`).join('')+'</tbody></table>' : '<div class="empty">Пока нет открытых виртуальных позиций. Приложение откроет их само, когда появится сильный сигнал.</div>'}`;

  document.getElementById('closedTradesCard').innerHTML = `<h2>Последние виртуальные сделки</h2>${paper.closedTrades.length ? '<table><thead><tr><th>Монета</th><th>Вход</th><th>Выход</th><th>PnL</th><th>Причина</th><th>Когда</th></tr></thead><tbody>'+paper.closedTrades.slice(0,20).map(t=>`<tr><td>${t.symbol}<div class="small muted">${tf(t.timeframe)}</div></td><td>${price(t.entryPrice)}</td><td>${price(t.exitPrice)}</td><td class="${Number(t.pnlUsd)>=0?'good':'bad'}">${money(t.pnlUsd)}</td><td>${t.closeReason}</td><td>${dt(t.closedAt)}</td></tr>`).join('')+'</tbody></table>' : '<div class="empty">Закрытых виртуальных сделок пока нет. Дайте приложению несколько циклов работы на рынке.</div>'}`;

  document.getElementById('latestSignalsCard').innerHTML = `<h2>Последние сигналы рынка</h2>${latest.items.length ? '<div class="list">'+latest.items.slice(0,12).map(signalShort).join('')+'</div>' : '<div class="empty">Сигналов пока нет. Проверьте, что сканер запускается и нет ошибок Bybit.</div>'}`;
}

async function resetPaper(){
  await j('/api/paper/reset',{method:'POST'});
  await load();
}

document.getElementById('reloadBtn').onclick = ()=> load().catch(showError);
document.getElementById('resetPaper').onclick = ()=> resetPaper().catch(showError);
document.getElementById('exportFull').onclick = ()=> { window.location.href = '/api/export/full'; };
function showError(error){
  alert(error.message || String(error));
}
load().catch(showError);
setInterval(()=> load().catch(()=>{}), 15000);
</script>
</body>
</html>
